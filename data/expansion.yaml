version: 4

# Percent-tilde (%~) expansion rules
# Authoritative syntax: audit/cmd-help/call-help.txt (CALL /?)

valid_modifiers:
  n: name
  x: extension
  f: full path
  d: drive
  p: path
  s: short names
  t: timestamp
  z: size
  a: attributes
  $: path search (e.g. %~$PATH:1)

# Letter modifiers for %~dpnx... combinations. Path-search $ is separate; see path_search_modifier.
valid_modifier_chars: "nxfpdstaz"

valid_parameter_patterns:
  - digit_0_9
  - for_var_letter

invalid_combinations:
  - modifiers: "*"
    reason: "%~ modifiers may not be used with %* (CALL /?)"
  # Matches forms like %~q1 or %~dq1 where a letter is outside nxfpdstaz.
  # Does not match %~1, %~dpnx0, %~*, or %~$PATH:1. Note: %~* is still
  # semantically invalid (see modifiers: "*" above); the letter-regex simply
  # does not catch the star form because * is an allowed terminator.
  - pattern: "%~[nxfpdstaz]*[^0-9*$nxfpdstaz]"
    reason: >-
      Percent-tilde letter modifiers must be from nxfpdstaz (CALL /?);
      the parameter must be 0-9, *, or a path-search $ENV: form

valid_combined_examples:
  - "%~1"
  - "%~dpnx1"
  - "%~f1"
  - "%~nx1"
  - "%~fs1"
  - "%~dp0"
  - "%~z0"
  - "%~ftza1"
  - "%~dp$PATH:1"

path_search_modifier:
  pattern: "%~$ENV:parameter"
  description: "Searches PATH or other env var for file; expands to first match"
  example: "%~$PATH:1"
  empty_on_miss: >-
    When the named environment variable is undefined or no matching file is
    found, %~$ENV:n expands to an empty string (CALL /?).

percent_tilde_notes:
  bare_quote_strip: "%~1 strips surrounding quotes from the parameter with no letter modifiers"
  multi_digit_parameter: >-
    %~10 is %~1 followed by literal 0; a single digit, *, or a path-search
    $ENV: form terminates %~ (CALL /?).
  modifier_order_independent: >-
    Letter modifiers may be combined in any order (%~dpnx0 and %~nxdp0 are
    equivalent).
  modifier_case_insensitive: >-
    Letter modifiers are not case-sensitive (%~DPNX0 and %~dpnx0 are equivalent;
    FOR /?).

percent_expansion:
  undefined_is_empty: >-
    Inside a .cmd/.bat script, an undefined name expands to an empty string for
    both %name% and (when delayed expansion is enabled) !name!. Incomplete forms
    without a closing % are not treated as successful expansions.
  interactive_undefined_literal: >-
    On the interactive command line, an undefined %name% often remains as the
    literal text %name% rather than expanding to empty (script behavior differs).
  incomplete_unclosed: >-
    An unclosed %name form (no matching closing %) is not a successful expansion.
    In scripts, cmd typically strips the leading % and leaves the following text
    as literals (for example %NOSUCH becomes NOSUCH; a lone % may yield empty).
    Prefer always-closed %name% / %% forms for portable scripts.

delayed_expansion:
  pattern: "!VAR!"
  requires_setlocal: false
  enable_keywords:
    - "setlocal enabledelayedexpansion"
    - "setlocal enableextensions enabledelayedexpansion"
  disable_keywords:
    - "setlocal disabledelayedexpansion"
    - "setlocal enableextensions disabledelayedexpansion"
  enable_paths:
    - "cmd /V:ON"
    - "SETLOCAL EnableDelayedExpansion"
    - "registry Command Processor DelayedExpansion"
  disable_paths:
    - "cmd /V:OFF"
    - "SETLOCAL DisableDelayedExpansion"
    - "registry Command Processor DelayedExpansion=0"
  substring_pattern: "!var:~start,length!"
  replacement_pattern: "!var:old=new!"
  digit_leading_names: >-
    Environment names that start with a digit expand with delayed !name! forms;
    percent %1name% is parsed as argument %1 plus literal text.
  exclamation_escaping: >-
    With delayed expansion enabled, ! is special at execution time. Escaping !
    typically needs caret doubling relative to the number of parse phases
    (commonly ^^! for a literal ! in ECHO). Percent signs still use %% rather
    than ^% for a literal %.
  case_insensitive_search: >-
    Delayed !var:old=new! search is case-insensitive, matching percent
    %var:old=new% behavior; replacement text is literal.

for_loop_variables:
  batch_file_prefix: "%%"
  command_line_prefix: "%"
  letter_charset: "a-zA-Z0-9?#$@_`[]{}+.-\\!*():/"
  letter_charset_notes: >-
    Live cmd.exe accepts letters, digits, and many punctuation characters as the
    single FOR variable letter. Operators that fail as FOR letters include
    % | & = ; < >. Tilde after %% starts %%~ modifier forms rather than a bare
    %%~ variable in the grammar. Prefer letters to avoid clashing with %0-%9.
  case_sensitive: >-
    FOR variable letters are case-sensitive (%i and %I are distinct). Up to 52
    active FOR variables may be in use (a-z and A-Z).

for_forms:
  description: >-
    With Command Extensions, FOR supports /D (directories only), /R (recursive
    tree; optional root path, default current directory), /L (numeric
    start,step,end), and /F (parse text from files, strings, or command output).
    Source: FOR /?.
  slash_d: >-
    FOR /D matches directory names only when the set contains wildcards.
  slash_r: >-
    FOR /R walks the directory tree rooted at an optional path (default: current
    directory). A set that is only '.' enumerates the tree without an extra
    file-set filter beyond the walk.
  slash_l: >-
    FOR /L iterates a numeric sequence (start,step,end), inclusive of endpoints
    that the step reaches.
  slash_f: >-
    FOR /F parses text from a file-set, a quoted string, or command output; see
    for_f for option details.

for_f:
  description: "FOR /F parsing options and input forms (FOR /?)"
  options:
    - eol
    - skip
    - delims
    - tokens
    - usebackq
  option_details:
    eol: "eol=c sets a single end-of-line comment character (default semicolon)"
    skip: "skip=n skips the first n lines of each input"
    delims: >-
      delims=xxx replaces the default delimiter set (space and tab). An empty
      delims= means no delimiters (whole line is one token); confirmed for forms
      such as FOR /F "delims=" %%a IN ("a b c"). When a space is included among
      delimiters it must be the last character of the delims= value; otherwise
      the options string can misparse. Delimiter characters are case-sensitive
      (delims=D does not treat lowercase d as a delimiter).
    tokens: >-
      tokens=x,y,m-n selects token indexes; a trailing * assigns the remainder
      of the line to one variable. Up to 26 tokens may be requested. Additional
      FOR variables are implied alphabetically from the declared letter. The
      implied chain must not attempt to declare a variable past z or Z
      (FOR /?).
    usebackq: >-
      usebackq switches quoting: backtick `command` for command output, single
      quotes for literal strings, and double quotes for filenames. Without
      usebackq, single quotes wrap a command and double quotes wrap a string.
  useback_synonym: >-
    Live cmd.exe also accepts useback as a synonym for usebackq (trailing q
    optional). Prefer the documented usebackq spelling in new scripts.
  consecutive_delims: >-
    Consecutive delimiter characters collapse to one delimiter; empty fields
    between repeated delimiters are not preserved by default.
  default_first_token: >-
    By default, /F passes the first blank-separated token from each line
    (FOR /?).
  variables_are_global: >-
    FOR variables are global for the cmd session (FOR /?): nested or sequential
    FOR loops that reuse the same letter share that replaceable parameter.
  input_forms: >-
    file-set; "string" (or 'string' with usebackq); 'command' (or `command`
    with usebackq). Blank lines are skipped.

caret_escape:
  description: >-
    Caret escaping is phase-driven. For ordinary multilevel escaping without
    CALL, each re-parse hop commonly needs 2^n-1 carets before a special
    character. CALL adds an extra re-parse that doubles every caret on its
    command tail (including carets inside double quotes), so nested CALL or
    percent-expanded command execution requires compensating counts per hop
    rather than relying on 2^n-1 alone across CALL boundaries.
  call_doubling: >-
    CALL doubles all carets once on its arguments before the line is parsed
    again; quoted carets are doubled even though quotes suppress escaping.
  line_continuation: >-
    A caret as the last character of a physical line continues onto the next
    line (the CRLF is escaped). A trailing space after ^ escapes the space
    instead, so the next line is not a continuation.

double_percent:
  for_body_rule: "FOR loop variables use %% in batch files"
  echo_literal_rule: "Literal % in ECHO often requires %% escaping"
  batch_vs_cmdline: >-
    Inside a .cmd/.bat file a literal percent is written as %% (for example
    echo Progress: 50%% prints Progress: 50%). On the interactive command line
    a single % is usually enough for a literal percent. FOR variables follow the
    same split: %%i in batch files versus %i interactively. SET /A modulo also
    uses %% in batch files (single % interactively).
  call_percent_reduction: >-
    CALL performs an extra parse of its argument tail that reduces each %% pair
    to a single % (in addition to caret doubling). Example: call echo %%%%
    prints a single %.

string_operations:
  substring_pattern: "%var:~start,length%"
  replacement_pattern: "%var:old=new%"
  description: "Batch substring and search-replace expansion"
  negative_offsets: >-
    Negative start counts from the end (%PATH:~-10%). Negative length trims
    from the end (%PATH:~0,-2%). Combined forms like %PATH:~7,-5% are valid.
  omit_length: >-
    If the length is omitted (%PATH:~10%), the substring runs from the start
    offset through the remainder of the value (SET /?).
  missing_or_empty_substring_batveat: >-
    When a name is undefined or expands to empty (including after SET name=),
    substring forms like %var:~-1% or %NOSUCH:~0,1% expand to the literal
    ~-offset[,length] text rather than an empty string. SET name= unsets the
    name (IF DEFINED is false); it does not leave a defined empty value.
  case_insensitive_search: >-
    In %var:old=new%, the search for old is case-insensitive; the replacement
    text new is inserted literally. The same case rule applies to delayed
    !var:old=new! forms.
  replace_all_occurrences: >-
    %var:old=new% substitutes every occurrence of old in the value (SET /?),
    not only the first match.
  empty_replacement_deletes: >-
    When new is empty (%var:old=%), each matched occurrence of old is deleted
    (SET /?).
  star_prefix_replace: >-
    In %var:*old=new%, a leading asterisk on the search text replaces from the
    beginning of the value through the first match of old.

set_a:
  description: "SET /A arithmetic expression operators (SET /?)"
  unary_operators:
    - "!"
    - "~"
    - "-"
  binary_operators:
    - "*"
    - "/"
    - "%"
    - "+"
    - "-"
    - "<<"
    - ">>"
    - "&"
    - "^"
    - "|"
  assignment_operators:
    - "="
    - "*="
    - "/="
    - "%="
    - "+="
    - "-="
    - "&="
    - "^="
    - "|="
    - "<<="
    - ">>="
  grouping: "Parentheses () group subexpressions"
  expression_separator: >-
    Comma separates multiple expressions in one SET /A; the final expression
    value is the overall result (and is printed when SET /A runs outside a script).
  hex_literal: "0x12 style hexadecimal integers"
  octal_literal: >-
    Leading-zero octal (022). Digits 08 and 09 are invalid octal and fail SET /A.
  modulo_in_batch: "Modulo uses %% in batch files (single % on the interactive command line)"
  quoting_rule: >-
    Logical operators and modulus that would be misparsed as command syntax
    need the expression quoted (SET /?).
  undefined_as_zero: >-
    An environment name that is not defined is treated as numeric 0. Names may
    appear without % percent signs inside the expression.
  bare_names: "Variable names in SET /A expressions expand without requiring %name% wrappers"
  integer_range: "Signed 32-bit integers (-2147483648 through 2147483647)"
  spaces_around_assignment: >-
    Unlike plain SET, SET /A allows spaces around = and other operators inside
    the expression.
  interactive_display: >-
    When SET /A runs from the interactive command line outside a script, it
    prints the final expression value.
  unary_bang_vs_delayed: >-
    SET /A lists unary ! (logical NOT). When delayed expansion is enabled,
    ! is also the delayed-expansion delimiter, so bare ! in a SET /A expression
    is consumed as delayed syntax first unless carefully quoted/escaped. Prefer
    testing unary ! with delayed expansion disabled, or quote the expression
    and avoid adjacent !name! forms.
  operator_precedence: >-
    Operators apply in decreasing precedence (SET /?): grouping (); unary
    ! ~ -; * / %; + -; << >>; &; ^; |; assignment operators; comma.
  overflow_wraps: >-
    Signed 32-bit overflow wraps (for example 2147483647+1 becomes
    -2147483648) rather than failing the expression.
  divide_by_zero_errorlevel: >-
    Division by zero and other failed SET /A expressions leave a non-zero
    ERRORLEVEL (exact code is implementation-defined).
  assignment_requires_name: >-
    Assignment operators require an environment variable name on the left
    (SET /?).

set_assignment:
  description: >-
    Without /A or /P, SET takes name=value where the name is everything after
    SET up to the first = and the value is everything after that =. Spaces
    adjacent to = become part of the name and/or value. Quoted forms like
    SET "name=value" keep spaces out of the name when the quotes wrap the
    assignment.
  prefix_query: >-
    With extensions, SET name (no equals) lists every defined variable whose
    name begins with that prefix (SET /?). Example: SET P lists PATH, PATHEXT,
    and other P* names.
  missing_name_errorlevel: >-
    SET with a name/prefix that matches no variable sets ERRORLEVEL to 1 and
    prints that the environment variable is not defined (SET /?).
  unset_with_empty_value: >-
    SET name= or SET "name=" removes the variable (IF DEFINED name is false).
    A value that is only spaces (SET "name= ") remains defined.
  bat_vs_cmd_errorlevel: >-
    After a successful plain SET (also PATH/PROMPT), a .cmd script typically
    clears ERRORLEVEL to 0, while the same statement in a .bat script often
    preserves the prior ERRORLEVEL. Prefer EXIT /B or cmd /C exit N when the
    exit code must be set explicitly.

set_p:
  description: >-
    SET /P var=[prompt] reads a line of input into var (SET /?). The prompt
    string is optional and may be empty (SET /P var=).
  eof_keeps_prior: >-
    If input ends immediately (EOF) or is redirected from NUL with no data,
    the prior value of var is left unchanged.
  pipe_child_isolation: >-
    The right-hand side of a pipe runs in a child cmd.exe context, so
    echo text| set /p var= updates var only in that child; the parent
    environment is unchanged (same isolation as other pipe-side mutations).

environment_variable_names:
  description: >-
    SET /? forbids '=' inside a variable name. Live cmd.exe accepts a wider
    charset than [A-Za-z_][A-Za-z0-9_]* — including '.', '-', and '~' (for
    example %my.var%, %a-b%, %a~b%). Quoted SET "a b=value" can define names
    that contain spaces; percent expansion then uses matching %a b% forms.
    Prefer underscore-alnum names for portability.
  forbidden_in_name: "="
  accepted_examples:
    - "my.var"
    - "a-b"
    - "a~b"
    - "a b"
  tokenizer_note: >-
    The ANTLR lexer treats %name% as a single PERCENT_VAR when the name uses
    letters, digits, underscore, '.', '-', or '~'. Spaced names are accepted
    at runtime but are not a single percent token (spaces remain separators);
    prefer documenting them via quoted SET forms in the parse corpus.

echo_forms:
  description: >-
    ECHO prints its arguments. Blank-line forms glue punctuation directly to
    ECHO with no intervening space (ECHO. ECHO: ECHO/ and similar). A spaced
    form such as ECHO . prints the punctuation instead of a blank line.
  blank_line_examples:
    - "echo."
    - "echo:"
    - "echo/"
    - "echo\\"
    - "echo("
    - "echo+"
    - "echo["
    - "echo]"
  blank_line_tokenizer_note: >-
    Live cmd accepts the listed blank-line spellings. The ANTLR lexer may split
    some of them (for example echo( is WORD echo plus LPAREN; echo[ / echo]
    can produce token-recognition errors for bare brackets). Prefer documenting
    runtime behavior here and using parse corpus cases for forms that tokenize
    cleanly.
  echo_on_off: >-
    ECHO ON and ECHO OFF toggle command echoing. A leading @ suppresses
    echoing for that single statement (@echo off).
  bare_or_whitespace_status: >-
    ECHO with no arguments, or with only whitespace arguments, prints the
    current ECHO is on/off status rather than a blank line.

cmd_processor_switches:
  description: >-
    CMD.EXE command-line switches that affect language behavior (CMD /?).
  delayed_expansion: "cmd /V:ON enables delayed expansion; /V:OFF disables it"
  extensions: "cmd /E:ON enables Command Extensions; /E:OFF disables them"
  defaults: >-
    Command Extensions are enabled by default; delayed expansion is disabled
    by default (CMD /?, SET /?).
  compatibility_aliases: >-
    For compatibility, /X is the same as /E:ON, /Y is the same as /E:OFF, and
    /R is the same as /C (CMD /?). Other unrecognized switches are ignored.
  c_k_s_quoting: >-
    /C runs string then terminates; /K runs string and remains. /S modifies
    quote handling after /C or /K. When /C or /K is used, quotes are preserved
    only if there is no /S, exactly two quotes, no special &<>()@^| between
    them, whitespace between the quotes, and the interior names an executable;
    otherwise a leading quote is stripped and the last quote on the line is
    removed (CMD /?).

setlocal_options:
  flags:
    - ENABLEEXTENSIONS
    - DISABLEEXTENSIONS
    - ENABLEDELAYEDEXPANSION
    - DISABLEDELAYEDEXPANSION
  nesting_limit: "SETLOCAL nesting is limited (commonly 32 levels)"
  implied_endlocal: "An unmatched SETLOCAL is ended when the batch script exits"
  argument_errorlevel: >-
    With extensions, SETLOCAL sets ERRORLEVEL to 0 when given a recognized
    Enable/Disable argument and to 1 for an unrecognized argument. Classic
    probe: VERIFY OTHER 2>nul & SETLOCAL ENABLEEXTENSIONS & IF ERRORLEVEL 1
    (SETLOCAL /?).
  survive_via_percent_on_same_line: >-
    Percent expansion happens before ENDLOCAL runs on a chained line, so
    endlocal & set "out=%in%" can export in into out after the local scope
    ends.
  precedence_over_cmd_switches: >-
    SETLOCAL Enable/Disable Extensions or DelayedExpansion takes precedence
    over CMD /E and /V for the duration of that local scope (SETLOCAL /?).
  endlocal_restores_state: >-
    ENDLOCAL restores the prior environment and the prior enabled/disabled
    state of Extensions and DelayedExpansion from the matching SETLOCAL
    (ENDLOCAL /?).

errorlevel:
  if_form: >-
    IF ERRORLEVEL n is true when the current exit code is greater than or equal
    to n (not equality). Prefer IF %ERRORLEVEL% EQU n for exact tests when the
    dynamic ERRORLEVEL name is not shadowed.
  variable_form: "%ERRORLEVEL% / !ERRORLEVEL! hold the numeric exit code as text"
  env_var_shadowing: >-
    A user-defined environment variable named ERRORLEVEL (also CMDCMDLINE,
    CMDEXTVERSION, and other dynamic names) overrides %name% expansion. Defining
    ERRORLEVEL with SET prevents later commands from updating the dynamic
    %ERRORLEVEL% value until that variable is cleared. IF ERRORLEVEL n still
    reads the internal exit code, not the shadowed environment string. Prefer
    cmd /C exit N (or EXIT /B) to set ERRORLEVEL rather than SET ERRORLEVEL=.

cmdextversion:
  description: >-
    IF CMDEXTVERSION n is true when the Command Extensions version is >= n.
    Never true when extensions are disabled. %CMDEXTVERSION% exposes the version.
    The first extensions version is 1 and increments when significant enhancements
    are added (IF /?).

dynamic_environment_variables:
  description: >-
    When Command Extensions are enabled, these names expand dynamically and do
    not appear in the SET listing unless the user defines a normal variable with
    the same name (which overrides the dynamic value). Source: SET /?.
  names:
    CD: current directory string
    DATE: current date (same format as DATE command)
    TIME: current time (same format as TIME command)
    RANDOM: random decimal integer from 0 to 32767
    ERRORLEVEL: current ERRORLEVEL value
    CMDEXTVERSION: Command Processor Extensions version number
    CMDCMDLINE: original command line that invoked the Command Processor
    HIGHESTNUMANODENUMBER: highest NUMA node number on this machine
  extensions_required: true

keyword_boundaries:
  description: >-
    Builtin keywords must not be glued to %, !, or quote marks. Live cmd expands
    percent forms first, so IF%1 and SET%x% become IF1 / SET1 and are not
    recognized as IF/SET. Spaced forms (IF %1, SET %x%, FOR %%i) are required.
  reject_glue_after_keyword:
    - "%"
    - "!"
    - "\""
    - "'"
    - "`"

if_forms:
  description: "IF predicates (IF /?)"
  base_forms:
    - "IF [NOT] ERRORLEVEL number command"
    - "IF [NOT] string1==string2 command"
    - "IF [NOT] EXIST filename command"
  extension_forms:
    - "IF [/I] string1 compare-op string2 command"
    - "IF CMDEXTVERSION number command"
    - "IF DEFINED variable command"
  compare_ops:
    - EQU
    - NEQ
    - LSS
    - LEQ
    - GTR
    - GEQ
  compare_ops_notes: >-
    If both sides are all decimal digits, compare-ops perform a numeric
    comparison; otherwise a string comparison. Quoting a side (for example
    "000" EQU "0") forces string comparison even when the text looks numeric.
    String ordering is not raw ASCII byte order (for example a LSS A can be
    true). /I forces case-insensitive string compares and also applies to the
    string1==string2 form and to compare-ops.
  defined_notes: "DEFINED takes a variable name without % percent signs"
  else_same_line: >-
    ELSE must appear on the same physical line as the end of the IF command
    (after the THEN command or the closing ')' of a parenthesized block).
  exist_files_and_directories: >-
    IF EXIST tests whether a file or directory path exists (trailing backslash
    forms commonly target directories).
  no_and_or_keywords: >-
    IF has no native boolean AND/OR keywords. Tokens such as and / or after a
    completed IF command are parsed as separate commands (often yielding
    "'and' is not recognized..."). Compose conditions with nested IF, chained
    && / || on ERRORLEVEL, or other documented patterns — not IF ... and ....

if_block_parentheses:
  description: >-
    A parenthesized THEN/ELSE block requires '(' on the same logical line as
    the predicate (or ELSE); intervening spaces before '(' are allowed. An
    unclosed '(' block is a syntax error at runtime. ELSE must attach to the
    closing ')' without an intervening newline (IF /?).

command_chaining:
  description: >-
    Statement separators and conditionals compose commandLine forms in the
    grammar and in cmd.exe.
  operators:
    "&": "Unconditional command separator; run the next statement regardless of ERRORLEVEL"
    "&&": "Run the next statement only if the prior statement left ERRORLEVEL 0"
    "||": "Run the next statement only if the prior statement left a non-zero ERRORLEVEL"
    "|": "Pipe stdout of the left statement into stdin of the right (not a conditional)"
  grouping: >-
    Parentheses group a statement list so trailing && / || observe the group's
    resulting ERRORLEVEL.
  pipe_child_process: >-
    Each side of a pipe runs in a child cmd.exe context. Environment mutations
    (SET, SET /P, SETLOCAL) on a pipe side do not update the parent environment.
  pipe_delayed_expansion_default: >-
    Pipe-side child cmd.exe instances start with the processor defaults for
    delayed expansion and extensions (delayed expansion off unless registry or
    an explicit /V:ON on that child enables it). Parent SETLOCAL
    EnableDelayedExpansion does not automatically apply inside the pipe child,
    so !var! on a pipe side often remains literal unless the child enables
    delayed expansion itself.
  and_or_chain_trap: >-
    In A && (B) || (C), statement C runs when A fails or when B leaves a
    non-zero ERRORLEVEL. A successful A followed by a failing B still executes
    C — this is not a boolean if/else. Group carefully or test ERRORLEVEL
    explicitly when only one of B/C should run.

batch_parameters:
  description: "Batch argument references (CALL /?, SHIFT /?)"
  percent_star: "%* expands to all arguments (%1 %2 ...)"
  percent_star_and_shift: >-
    SHIFT moves %1/%2/... but does not change the text expanded by %* (still
    the original full argument list).
  shift_n: >-
    With extensions, SHIFT /n starts shifting at argument n where n is 0..8
    (SHIFT /?). SHIFT /9 is invalid.
  shift_default: >-
    Bare SHIFT (no /n) shifts starting at %0: the former %1 becomes the new %0,
    former %2 becomes %1, and so on.
  percent_zero: >-
    %0 / %~0 is the script path or, inside CALL :label, the :label identity —
    not a user-supplied argument. Path modifiers such as %~dp0 apply. The text
    of %0 mirrors the spelling/casing/quoting used to invoke the script or
    CALL :label (for example CALL :MiXeD yields %0=':MiXeD').
  argument_delimiters: >-
    Unquoted argument tokens are split on space, tab, comma, semicolon, and
    equals. Quotes preserve those characters inside a single argument.

call_goto:
  description: "CALL :label and GOTO :EOF (CALL /?, GOTO /?)"
  call_label: >-
    CALL :label arguments creates a new batch context at the label. Control
    returns to the statement after CALL when the called context reaches EOF
    (or GOTO :EOF). Reaching EOF a second time exits the script.
  call_requires_colon_for_label: >-
    CALL :label requires the colon for an internal label. CALL name without a
    colon searches PATH/PATHEXT for an external program or script instead of
    jumping to :name.
  call_missing_label: >-
    CALL :missinglabel sets ERRORLEVEL to 1 and continues with the next
    statement (it does not abort the script).
  call_script_returns: >-
    CALL other.cmd (or other.bat) runs the script and returns to the caller.
    Invoking other.cmd as a bare command transfers control permanently and does
    not return to the caller when the child ends.
  goto_eof: >-
    GOTO :EOF transfers control to the end of the current batch script file
    without requiring a user-defined label. A user label named :eof does not
    replace this extension target.
  goto_eof_vs_label: >-
    With the colon (GOTO :EOF), Command Extensions treat EOF as the end-of-file
    target and ignore a user label :EOF. Without the colon (GOTO EOF), cmd
    performs an ordinary label search and jumps to :EOF if present.
  goto_label_matching: >-
    Ordinary GOTO targets are matched case-insensitively. A leading colon on
    the GOTO operand is optional for user labels (goto foo and goto :foo both
    match :Foo). A missing label aborts with an error and does not continue.
  label_line_form: >-
    A label is a line beginning with a colon (GOTO /?). Indented labels are
    accepted by cmd; prefer a colon in column 0 for portable scripts.

exit_semantics:
  description: "EXIT [/B] [exitCode] (EXIT /?)"
  bare_exit: >-
    Bare EXIT (without /B) terminates the cmd.exe process (closes the console
    session when it is the top-level interpreter). Prefer EXIT /B inside batch
    scripts when only the script/routine should end.
  exit_b: >-
    EXIT /B exits the current batch script context (returns from a CALL :label
    routine, or ends the script) without necessarily closing the parent cmd.exe
    window. Optional exitCode sets ERRORLEVEL when using /B.

remarks:
  rem: >-
    REM remarks out the remainder of the physical line when used as a command.
    Because the lexer consumes from REM through end-of-line, a trailing
    `& command` on the same REM line is not a separate statement (it does not
    run). Midline REM after other tokens is not special — only line-start REM
    is recognized as a remark command.
  double_colon: >-
    A line starting with :: is a label whose second character is :, commonly
    used as a remark. Labels must not place : in the second character position
    for real jump targets. :: inside parenthesized blocks can be fragile at runtime.
  rem_vs_label: >-
    Prefer REM for portable remarks. :: is a label form and can break or
    misparse inside parenthesized IF/FOR blocks.

redirection:
  description: >-
    Cmd.exe I/O redirection attaches to a statement (or parenthesized group).
    Handle numbers default to 1 (stdout) for > / >> and 0 (stdin) for <.
  operators:
    ">": "Overwrite redirect of stdout (or n>) to a file"
    ">>": "Append redirect of stdout (or n>>) to a file"
    "<": "Redirect stdin (or n<) from a file"
    ">&": "Duplicate an output handle onto another handle (e.g. 2>&1, >&2)"
    "<&": "Duplicate an input handle onto another handle"
  examples:
    - "echo ok >out.txt"
    - "echo more >>out.txt"
    - "sort <in.txt"
    - "command 2>err.txt"
    - "command >out.txt 2>&1"
    - "command 1>nul 2>&1"
    - "command >&2"
    - ">out.txt echo hi"
  nul_suppress: >-
    Redirecting to NUL discards that stream (commonly 1>nul, 2>nul, or
    >nul 2>&1).
  group_redirect: >-
    A parenthesized group may take a trailing redirect that applies to the
    whole group.
  leading_redirect: >-
    A redirect may appear before the command name (for example
    >out.txt echo hi); cmd applies it to that statement.
  handle_order: >-
    Redirects apply left to right. command >file 2>&1 sends both stdout and
    stderr to file. command 2>&1 >file first duplicates stderr to the current
    stdout (often the console), then redirects stdout alone to file, so stderr
    may remain on the console.

paren_block_expansion:
  description: >-
    Parentheses group statements into a block. Percent (%) expansion for names
    inside the block is performed when the block is parsed, not when each line
    executes. Delayed expansion (!name!) is performed at execution time when
    enabled. Therefore SET name=value followed by echo %name% inside the same
    block typically still shows the pre-block value, while echo !name! shows
    the updated value after SETLOCAL EnableDelayedExpansion.
  percent_at_parse: >-
    %var% inside ( ) expands with the value known when the block is read.
  delayed_at_execution: >-
    !var! inside ( ) expands when that line runs, seeing SET updates from
    earlier lines in the same block.
  dual_value_swap: >-
    Because %var% is captured when the block is parsed and !var! updates at
    execution, a naked parenthesized block can observe both the pre-block and
    in-block values (for example swapping two variables with percent expansion
    inside one block).
