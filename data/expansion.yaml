version: 12

# Percent-tilde (%~) expansion rules
# Authoritative syntax: audit/cmd-help/call-help.txt (CALL /?)
# Requires Command Extensions (CALL /?); see command_extensions_off.

valid_modifiers:
  n: name
  x: extension
  f: full path
  d: drive
  p: path
  s: short names
  t: timestamp
  z: size
  a: attributes
  $: path search (e.g. %~$PATH:1)

# Letter modifiers for %~dpnx... combinations. Path-search $ is separate; see path_search_modifier.
valid_modifier_chars: "nxfpdstaz"

valid_parameter_patterns:
  - digit_0_9
  - for_var_letter

invalid_combinations:
  - modifiers: "*"
    reason: "%~ modifiers may not be used with %* (CALL /?)"
  # Matches forms like %~q1 or %~dq1 where a letter is outside nxfpdstaz.
  # Does not match %~1, %~dpnx0, %~*, or %~$PATH:1. Note: %~* is still
  # semantically invalid (see modifiers: "*" above); the letter-regex simply
  # does not catch the star form because * is an allowed terminator.
  - pattern: "%~[nxfpdstaz]*[^0-9*$nxfpdstaz]"
    reason: >-
      Percent-tilde letter modifiers must be from nxfpdstaz (CALL /?);
      the parameter must be 0-9, *, or a path-search $ENV: form

valid_combined_examples:
  - "%~1"
  - "%~dpnx1"
  - "%~f1"
  - "%~nx1"
  - "%~fs1"
  - "%~dp0"
  - "%~z0"
  - "%~ftza1"
  - "%~dp$PATH:1"

path_search_modifier:
  pattern: "%~$ENV:parameter"
  description: "Searches PATH or other env var for file; expands to first match"
  example: "%~$PATH:1"
  empty_on_miss: >-
    When the named environment variable is undefined or no matching file is
    found, %~$ENV:n expands to an empty string (CALL /?).

percent_tilde_notes:
  requires_command_extensions: >-
    Percent-tilde (%~) modifiers and path-search forms require Command
    Extensions (CALL /?). With extensions disabled, %~1 / %~dp0 / %~$PATH:1
    are not expanded (the leading % is consumed and the remainder such as
    ~1 or ~dp0 remains literal text). Base %0-%9 still expand without
    extensions.
  bare_quote_strip: "%~1 strips surrounding quotes from the parameter with no letter modifiers"
  multi_digit_parameter: >-
    %~10 is %~1 followed by literal 0; a single digit, *, or a path-search
    $ENV: form terminates %~ (CALL /?).
  modifier_order_independent: >-
    Letter modifiers may be combined in any order (%~dpnx0 and %~nxdp0 are
    equivalent).
  modifier_case_insensitive: >-
    Letter modifiers are not case-sensitive (%~DPNX0 and %~dpnx0 are equivalent;
    FOR /?).
  attribute_mask: >-
    %~a / %%~a expands to a fixed-width attribute mask (commonly 11 characters)
    using letters and dashes in DIR-like slots (for example --a-------- for an
    archive file). Missing files expand the attribute field to empty (CALL /?).
  bare_vs_f_qualification: >-
    Bare %~1 / %%~ strips quotes but keeps the argument spelling (relative or
    as given). The f modifier (%~f1 / %%~f) expands to a fully qualified path
    based on the current directory when the argument has no drive/path; this
    happens even when the target file does not exist. Combining F with other
    letters (for example %~Ff1) is equivalent for qualification (CALL /?).
  short_name_form: >-
    The s modifier requests short (8.3) name components. %~s1 / %%~s and
    combinations such as %~sf1 expand to a fully qualified path whose path
    segments use short names where available (not a basename-only short name).
    When short names are unavailable, cmd may still return a qualified path
    (CALL /?; filesystem-dependent).
  timestamp_format: >-
    %~t / %%~t expands to the file's last-write date/time using the locale's
    DATE/TIME formatting (separators and AM/PM style vary). Missing files
    expand the timestamp field to empty (CALL /?).

percent_expansion:
  undefined_is_empty: >-
    Inside a .cmd/.bat script, an undefined name expands to an empty string for
    both %name% and (when delayed expansion is enabled) !name!. Incomplete forms
    without a closing % are not treated as successful expansions.
  interactive_undefined_literal: >-
    On the interactive command line, an undefined %name% often remains as the
    literal text %name% rather than expanding to empty (script behavior differs).
  incomplete_unclosed: >-
    An unclosed %name form (no matching closing %) is not a successful expansion.
    In scripts, cmd typically strips the leading % and leaves the following text
    as literals (for example %NOSUCH becomes NOSUCH; a lone % may yield empty).
    Prefer always-closed %name% / %% forms for portable scripts.

delayed_expansion:
  pattern: "!VAR!"
  requires_setlocal: false
  default_off: >-
    Delayed expansion is disabled by default (CMD /?, SET /?). Enable it
    explicitly via cmd /V:ON, SETLOCAL EnableDelayedExpansion, or the Command
    Processor DelayedExpansion registry value.
  literal_when_disabled: >-
    When delayed expansion is disabled, !var! (including substring and replace
    forms) is ordinary literal text and is not expanded.
  orthogonal_to_extensions: >-
    Delayed expansion is independent of Command Extensions. cmd /E:OFF /V:ON
    (or SETLOCAL DisableExtensions EnableDelayedExpansion) still expands plain
    !var! forms. Percent and delayed substring/replace ops (%var:~% / !var:~!
    and :old=new) still require extensions; with extensions off those bang
    forms do not perform substring/replace.
  enable_keywords:
    - "setlocal enabledelayedexpansion"
    - "setlocal enableextensions enabledelayedexpansion"
  disable_keywords:
    - "setlocal disabledelayedexpansion"
    - "setlocal enableextensions disabledelayedexpansion"
  enable_paths:
    - "cmd /V:ON"
    - "SETLOCAL EnableDelayedExpansion"
    - "registry Command Processor DelayedExpansion"
  disable_paths:
    - "cmd /V:OFF"
    - "SETLOCAL DisableDelayedExpansion"
    - "registry Command Processor DelayedExpansion=0"
  substring_pattern: "!var:~start,length!"
  replacement_pattern: "!var:old=new!"
  digit_leading_names: >-
    Environment names that start with a digit expand with delayed !name! forms;
    percent %1name% is parsed as argument %1 plus literal text.
  exclamation_escaping: >-
    With delayed expansion enabled, a literal ! commonly needs caret escaping
    such as ^^!. The same ^^ before a non-! character yields a single caret
    (for example ^^2 becomes ^2), so bang escaping is phase-sensitive and not
    identical to ordinary caret doubling for other characters.
  case_insensitive_search: >-
    Delayed !var:old=new! search is case-insensitive, matching percent
    %var:old=new% behavior; replacement text is literal.
  indirect_expansion: >-
    With delayed expansion enabled, percent expansion runs before delayed
    expansion, so !%name%! first substitutes %name% then expands the resulting
    !value! at execution time (for example set Car=Toyota & set Toyota=Prius
    yields !%Car%! -> Prius). Related forms such as !prefix%name%! /
    !%name%suffix! follow the same two-phase substitution. Without delayed
    expansion, !...! is literal text.
  for_accumulate_pattern: >-
    With delayed expansion enabled, a FOR body can accumulate with forms such
    as set "LIST=!LIST! %%i" so each iteration sees the updated LIST. Plain
    %LIST% expands when the FOR block is parsed and stays fixed for the loop.

for_loop_variables:
  batch_file_prefix: "%%"
  command_line_prefix: "%"
  letter_charset: "a-zA-Z0-9?#$@_`[]{}+.-\\!*():/"
  letter_charset_notes: >-
    Live cmd.exe accepts letters, digits, and many punctuation characters as the
    single FOR variable letter. Operators that fail as FOR letters include
    % | & = ; < >. Tilde after %% starts %%~ modifier forms rather than a bare
    %%~ variable in the grammar. Prefer letters to avoid clashing with %0-%9.
  case_sensitive: >-
    FOR variable letters are case-sensitive (%i and %I are distinct). Up to 52
    active FOR variables may be in use (a-z and A-Z).

for_forms:
  description: >-
    With Command Extensions, FOR supports /D (directories only), /R (recursive
    tree; optional root path, default current directory), /L (numeric
    start,step,end), and /F (parse text from files, strings, or command output).
    Source: FOR /?.
  slash_d: >-
    FOR /D matches directory names only when the set contains wildcards.
  slash_r: >-
    FOR /R walks the directory tree rooted at an optional path (default: current
    directory). A set that is only '.' enumerates each directory visited
    (including the root of the walk). When the set has no wildcards (* or ?),
    FOR /R synthesizes a candidate path of root\setname under each directory
    visited (even when that file does not exist) rather than matching existing
    files by wildcard (FOR /?).
  slash_d_r: >-
    FOR /D /R (directories recursively) with a wildcard set such as (*) lists
    matching subdirectory names under the walk and does not emit the walk root
    itself as a match. Prefer FOR /R %%D in (.) when the root directory must be
    included in the enumeration.
  slash_l: >-
    FOR /L iterates a numeric sequence (start,step,end), inclusive of endpoints
    that the step reaches. The end need not be hit exactly; iteration stops once
    the index passes the end in the step direction.
  slash_f: >-
    FOR /F parses text from a file-set, a quoted string, or command output; see
    for_f for option details.
  classic_literal_set: >-
    In the classic FOR %%i IN (set) DO form, set members without wildcards (* or
    ?) are treated as literal strings and are iterated even when no matching
    file exists (for example FOR %%i IN (nosuch.xyz) DO ... runs once with
    %%i=nosuch.xyz). Wildcards match existing filesystem entries (FOR /?).
  wildcard_question_trailing: >-
    In FOR file-set masks, a trailing ? (or ? immediately before a dot) can match
    fewer characters than the number of question marks, including matching a
    shorter basename (for example ???.txt may match a.txt as well as ab.txt).
    Short 8.3 names can also satisfy masks that the long name alone would not;
    treat mask matching as filesystem-dependent.

for_f:
  description: "FOR /F parsing options and input forms (FOR /?)"
  options:
    - eol
    - skip
    - delims
    - tokens
    - usebackq
  option_details:
    eol: "eol=c sets a single end-of-line comment character (default semicolon)"
    skip: "skip=n skips the first n lines of each input"
    delims: >-
      delims=xxx replaces the default delimiter set (space and tab). An empty
      delims= means no delimiters (whole line is one token); confirmed for forms
      such as FOR /F "delims=" %%a IN ("a b c"). When a space is included among
      delimiters it must be the last character of the delims= value; otherwise
      the options string can misparse. Delimiter characters are case-sensitive
      (delims=D does not treat lowercase d as a delimiter).
    tokens: >-
      tokens=x,y,m-n selects token indexes; a trailing * assigns the remainder
      of the line to one variable. Up to 26 tokens may be requested. Additional
      FOR variables are implied alphabetically from the declared letter. The
      implied chain must not attempt to declare a variable past z or Z
      (FOR /?).
    usebackq: >-
      usebackq switches quoting: backtick `command` for command output, single
      quotes for literal strings, and double quotes for filenames. Without
      usebackq, single quotes wrap a command and double quotes wrap a string.
  useback_synonym: >-
    Live cmd.exe also accepts useback as a synonym for usebackq (trailing q
    optional). Prefer the documented usebackq spelling in new scripts.
  unquoted_options_caret: >-
    When an options string cannot use surrounding double quotes (for example
    because delims must include a quote character), the options may be written
    unquoted with caret-escaped equals and spaces, such as
    tokens^=1-2^ delims^=^". Prefer quoted options whenever possible.
  consecutive_delims: >-
    Consecutive delimiter characters collapse to one delimiter; empty fields
    between repeated delimiters are not preserved by default.
  default_first_token: >-
    By default, /F passes the first blank-separated token from each line
    (FOR /?).
  variables_are_global: >-
    FOR replaceable parameters are single-letter, case-sensitive, and drawn from
    a shared session namespace of up to 52 active letters (FOR /?). Metavar
    expansion applies in the FOR DO body (including &-chained commands on that
    body), not in later unrelated statements or in a CALL :label body unless the
    value is passed as an ordinary argument. Nested FOR loops may reuse the same
    letter: during the inner loop the letter holds the inner value; after the
    inner FOR completes, the outer value is restored on modern Windows.
  input_forms: >-
    file-set; "string" (or 'string' with usebackq); 'command' (or `command`
    with usebackq). Blank lines are skipped.

caret_escape:
  description: >-
    Caret escaping is phase-driven. For ordinary multilevel escaping without
    CALL, each re-parse hop commonly needs 2^n-1 carets before a special
    character. CALL adds an extra re-parse that doubles every caret on its
    command tail (including carets inside double quotes), so nested CALL or
    percent-expanded command execution requires compensating counts per hop
    rather than relying on 2^n-1 alone across CALL boundaries.
  call_doubling: >-
    CALL doubles all carets once on its arguments before the line is parsed
    again; quoted carets are doubled even though quotes suppress escaping.
  line_continuation: >-
    A caret as the last character of a physical line continues onto the next
    line (the CRLF is escaped). A trailing space after ^ escapes the space
    instead, so the next line is not a continuation.
  percent_not_escaped: >-
    Caret does not escape percent. Percent expansion runs before caret-escape
    processing, so ^%name% still expands %name% (use %% in scripts for a
    literal percent). Escaping ! under delayed expansion is a separate
    phase-sensitive rule (see delayed_expansion.exclamation_escaping).
  metachar_inventory: >-
    Characters that commonly require caret escaping outside quotes include
    & | < > ^ and sometimes (). Double quotes suppress those metacharacters
    for command parsing but do not suppress percent expansion or delayed
    ! expansion (see quoting). Literal % uses %% in scripts; literal ! under
    delayed expansion commonly needs caret doubling such as ^^!. Multilevel
    re-parse uses 2^n-1 carets (or CALL doubling) rather than a single ^
    always being enough.

quoting:
  description: >-
    Double quotes group an argument and suppress command metacharacters, but
    they do not disable percent or delayed-expansion parsing.
  suppress_metacharacters: >-
    Inside double quotes, & | < > ^ and () lose their command-separator /
    redirect / escape meaning for that quoted span (they may appear as literal
    text in the argument). Quotes themselves are stripped from %~1 bare
    quote-strip forms.
  no_suppress_percent_or_delayed: >-
    Percent expansion (%name%, %1, %~...) still runs inside double quotes.
    When delayed expansion is enabled, !name! also expands inside quotes.
    Use %% / phase-aware ! escaping when a literal percent or exclamation
    mark must survive.

double_percent:
  for_body_rule: "FOR loop variables use %% in batch files"
  echo_literal_rule: "Literal % in ECHO often requires %% escaping"
  batch_vs_cmdline: >-
    Inside a .cmd/.bat file a literal percent is written as %% (for example
    echo Progress: 50%% prints Progress: 50%). On the interactive command line
    a single % is usually enough for a literal percent. FOR variables follow the
    same split: %%i in batch files versus %i interactively. SET /A modulo also
    uses %% in batch files (single % interactively).
  call_percent_reduction: >-
    CALL performs an extra parse of its argument tail that reduces each %% pair
    to a single % (in addition to caret doubling). Example: call echo %%%%
    prints a single %.

string_operations:
  substring_pattern: "%var:~start,length%"
  replacement_pattern: "%var:old=new%"
  description: "Batch substring and search-replace expansion"
  requires_command_extensions: >-
    Substring (%var:~...) and replace (%var:old=new%) forms require Command
    Extensions (SET /?). With extensions disabled these expansions do not
    apply as documented substring/replace operations.
  negative_offsets: >-
    Negative start counts from the end (%PATH:~-10%). Negative length trims
    from the end (%PATH:~0,-2%). Combined forms like %PATH:~7,-5% are valid.
  omit_length: >-
    If the length is omitted (%PATH:~10%), the substring runs from the start
    offset through the remainder of the value (SET /?).
  missing_or_empty_substring_batveat: >-
    When a name is undefined or expands to empty (including after SET name=),
    substring forms like %var:~-1% or %NOSUCH:~0,1% expand to the literal
    ~-offset[,length] text rather than an empty string. SET name= unsets the
    name (IF DEFINED is false); it does not leave a defined empty value.
  case_insensitive_search: >-
    In %var:old=new%, the search for old is case-insensitive; the replacement
    text new is inserted literally. The same case rule applies to delayed
    !var:old=new! forms.
  replace_all_occurrences: >-
    %var:old=new% substitutes every occurrence of old in the value (SET /?),
    not only the first match.
  empty_replacement_deletes: >-
    When new is empty (%var:old=%), each matched occurrence of old is deleted
    (SET /?).
  star_prefix_replace: >-
    In %var:*old=new%, a leading asterisk on the search text replaces from the
    beginning of the value through the first match of old.

set_a:
  description: "SET /A arithmetic expression operators (SET /?)"
  requires_command_extensions: >-
    SET /A requires Command Extensions (SET /?). With extensions disabled, an
    unquoted form such as set /A N=1+1 is treated as a plain assignment whose
    variable name includes the /A token (for example name "/A N" with value
    "1+1"), not as arithmetic (see command_extensions_off.set_a_and_string_ops).
    Quoted forms such as set /A "N=1+1" are a syntax error when extensions are
    off (same family as quoted SET "name=value" under OFF).
  unary_operators:
    - "!"
    - "~"
    - "-"
  binary_operators:
    - "*"
    - "/"
    - "%"
    - "+"
    - "-"
    - "<<"
    - ">>"
    - "&"
    - "^"
    - "|"
  assignment_operators:
    - "="
    - "*="
    - "/="
    - "%="
    - "+="
    - "-="
    - "&="
    - "^="
    - "|="
    - "<<="
    - ">>="
  grouping: "Parentheses () group subexpressions"
  expression_separator: >-
    Comma separates multiple expressions in one SET /A; the final expression
    value is the overall result (and is printed when SET /A runs outside a script).
  hex_literal: "0x12 style hexadecimal integers"
  octal_literal: >-
    Leading-zero octal (022). Digits 08 and 09 are invalid octal and fail SET /A.
  no_binary_literal: >-
    SET /A does not accept 0b-style binary integer literals. Only decimal,
    0x hexadecimal, and leading-zero octal forms are recognized (SET /?). A
    form such as 0b10 fails the expression (non-zero ERRORLEVEL; the target
    variable is left unset/unchanged for a failed assignment).
  modulo_in_batch: "Modulo uses %% in batch files (single % on the interactive command line)"
  quoting_rule: >-
    Logical operators and modulus that would be misparsed as command syntax
    need the expression quoted (SET /?).
  undefined_as_zero: >-
    An environment name that is not defined is treated as numeric 0. Names may
    appear without % percent signs inside the expression.
  bare_names: "Variable names in SET /A expressions expand without requiring %name% wrappers"
  integer_range: "Signed 32-bit integers (-2147483648 through 2147483647)"
  spaces_around_assignment: >-
    Unlike plain SET, SET /A allows spaces around = and other operators inside
    the expression.
  interactive_display: >-
    When SET /A runs from the interactive command line outside a script, it
    prints the final expression value.
  unary_bang_vs_delayed: >-
    SET /A lists unary ! (logical NOT). When delayed expansion is enabled,
    ! is also the delayed-expansion delimiter, so bare ! in a SET /A expression
    is consumed as delayed syntax first unless carefully quoted/escaped. Prefer
    testing unary ! with delayed expansion disabled, or quote the expression
    and avoid adjacent !name! forms.
  operator_precedence: >-
    Operators apply in decreasing precedence (SET /?): grouping (); unary
    ! ~ -; * / %; + -; << >>; &; ^; |; assignment operators; comma.
  overflow_wraps: >-
    Signed 32-bit overflow wraps (for example 2147483647+1 becomes
    -2147483648) rather than failing the expression.
  divide_by_zero_errorlevel: >-
    Division by zero and other failed SET /A expressions leave a non-zero
    ERRORLEVEL (exact code is implementation-defined; live Windows 10 cmd often
    uses 1073750993 for divide-by-zero and 1073750991 for invalid numeric
    literals such as 08 or 0b10).
  integer_division_truncates: >-
    The / operator performs signed integer division toward zero (for example
    7/2 yields 3 and -7/2 yields -3). There is no floating-point result.
  no_power_operator: >-
    SET /A has no exponent/power operator. ^ is bitwise XOR, not power; forms
    such as 2**3 are not valid SET /A syntax.
  failed_leaves_prior: >-
    When a SET /A assignment expression fails (divide-by-zero, invalid number,
    etc.), the target variable is left unchanged (prior value or still unset).
  assignment_requires_name: >-
    Assignment operators require an environment variable name on the left
    (SET /?).
  parameter_as_lhs: >-
    With extensions, a percent-expanded argument can supply the left-hand
    variable name (for example set /A %~1=%~2+%~3 after CALL :Add out 1 2).
    The name must expand before SET /A evaluates the expression.

set_assignment:
  description: >-
    Without /A or /P, SET takes name=value where the name is everything after
    SET up to the first = and the value is everything after that =. Spaces
    adjacent to = become part of the name and/or value. Quoted forms like
    SET "name=value" keep spaces out of the name when the quotes wrap the
    assignment.
  prefix_query: >-
    With extensions, SET name (no equals) lists every defined variable whose
    name begins with that prefix (SET /?). Example: SET P lists PATH, PATHEXT,
    and other P* names.
  missing_name_errorlevel: >-
    SET with a name/prefix that matches no variable sets ERRORLEVEL to 1 and
    prints that the environment variable is not defined (SET /?).
  unset_with_empty_value: >-
    SET name= or SET "name=" removes the variable (IF DEFINED name is false).
    A value that is only spaces (SET "name= ") remains defined.
  bat_vs_cmd_errorlevel:
    description: >-
      Script file extension changes whether certain successful internal
      commands clear ERRORLEVEL. Prefer EXIT /B or cmd /C exit N when the exit
      code must be set explicitly.
    commands_clear_in_cmd: >-
      With Command Extensions enabled, successful SET, PATH, PROMPT, ASSOC, and
      FTYPE in a .cmd script set ERRORLEVEL to 0. The same successful commands
      in a .bat script leave the prior ERRORLEVEL unchanged. Live Windows 10/11
      cmd also applies this clear-vs-preserve rule to successful SET /A and
      SET /P (redirect/file input). APPEND is not part of this live-verified
      matrix: modern hosts typically lack APPEND as an internal or PATH command
      (see commands.yaml removed_commands.append).
    failure_still_sets: >-
      Failures still set a non-zero ERRORLEVEL in both .bat and .cmd (for
      example SET with a missing prefix name sets ERRORLEVEL 1).
    probe_recipe: >-
      Reset with cmd /C exit N immediately before the command under test, then
      read %ERRORLEVEL% (extensions on) or IF ERRORLEVEL (always). Avoid
      echo|set /P probes: the pipe runs SET /P in a child and does not update
      the parent environment.
    extensions_off: >-
      Without extensions, dynamic %ERRORLEVEL% / !ERRORLEVEL! are unavailable,
      so bat-vs-cmd clearing is best observed with IF ERRORLEVEL. Plain SET
      assignment still runs; SET /A and SET /P are not arithmetic/prompt forms
      when extensions are off (see command_extensions_off).
  bare_set_lists_all: >-
    SET with no arguments lists the entire environment (SET /?). Dynamic
    names such as CD/DATE/TIME are omitted unless the user defined ordinary
    variables with those names.
  ampersand_terminator: >-
    An unquoted & ends the SET statement. Trailing spaces before & remain part
    of the value (for example set name=value   & rem keeps the trailing
    spaces). Use this to terminate a value that would otherwise include the
    rest of a chained line.

set_p:
  description: >-
    SET /P var=[prompt] reads a line of input into var (SET /?). The prompt
    string is optional and may be empty (SET /P var=). Requires Command
    Extensions (see command_extensions_off.set_p_requires_extensions).
  eof_keeps_prior: >-
    If input ends immediately (EOF) or is redirected from NUL with no data,
    the prior value of var is left unchanged.
  blank_line_keeps_prior: >-
    A blank input line (the user presses Enter with no text, or a redirected
    file whose next line is empty) leaves the prior value of var unchanged --
    the same keep-prior behavior as EOF/NUL. It does not assign an empty
    string. A line that contains only spaces assigns those spaces (the
    variable remains defined).
  pipe_child_isolation: >-
    The right-hand side of a pipe runs in a child cmd.exe context, so
    echo text| set /p var= updates var only in that child; the parent
    environment is unchanged (same isolation as other pipe-side mutations).
  redirect_from_file: >-
    SET /P var=<file reads the first line of file into var (stdin redirect).
    Later lines are not consumed by that SET /P. Combined with eof_keeps_prior
    and blank_line_keeps_prior when the file is empty or the next line is blank.

environment_variable_names:
  description: >-
    SET /? forbids '=' inside a variable name. Live cmd.exe accepts a wider
    charset than [A-Za-z_][A-Za-z0-9_]* -- including '.', '-', '~', and many
    punctuation characters (for example %a~b%, %var;x%, %var@x%, %var#x%,
    and %var$with.odd[chars]% after a matching SET). Quoted SET "a b=value"
    can define names that contain spaces; percent expansion then uses matching
    %a b% forms. Prefer underscore-alnum names for portability.
  forbidden_in_name: "="
  accepted_examples:
    - "my.var"
    - "a-b"
    - "a~b"
    - "a b"
    - "var;x"
    - "var@x"
    - "var#x"
    - "var$with.odd[chars]"
  tokenizer_note: >-
    The ANTLR lexer treats %name% as a single PERCENT_VAR when the name uses
    letters, digits, underscore, '.', '-', or '~'. Spaced names and many
    punctuation-heavy names are accepted at runtime but may not be a single
    percent token; prefer documenting them via SET forms in the parse corpus.
  case_insensitive_names: >-
    Environment variable names are case-insensitive for lookup and assignment
    (%abc% and %AbC% refer to the same variable). Values are stored with the
    casing used in the SET that defined them.
  paren_names: >-
    Names may include parentheses (for example ProgramFiles(x86)). Prefer
    quoted SET "ProgramFiles(x86)=..." forms. Percent expansion of such names
    can interact with parenthesized blocks; keep expansions simple or use
    delayed expansion carefully.

echo_forms:
  description: >-
    ECHO prints its arguments. Blank-line forms glue punctuation directly to
    ECHO with no intervening space (ECHO. ECHO: ECHO/ and similar). A spaced
    form such as ECHO . prints the punctuation instead of a blank line.
  blank_line_examples:
    - "echo."
    - "echo:"
    - "echo/"
    - "echo\\"
    - "echo("
    - "echo+"
    - "echo["
    - "echo]"
  blank_line_tokenizer_note: >-
    Live cmd accepts the listed blank-line spellings. The ANTLR lexer may split
    some of them (for example echo( is WORD echo plus LPAREN; echo[ / echo]
    can produce token-recognition errors for bare brackets). Prefer documenting
    runtime behavior here and using parse corpus cases for forms that tokenize
    cleanly.
  echo_on_off: >-
    ECHO ON and ECHO OFF toggle command echoing. A leading @ suppresses
    echoing for that single statement (@echo off).
  bare_or_whitespace_status: >-
    ECHO with no arguments, or with only whitespace arguments, prints the
    current ECHO is on/off status rather than a blank line.
  at_prefix: >-
    A leading @ suppresses echo of that one statement when ECHO is ON (not only
    @echo off). It applies to arbitrary commands, not only ECHO.

cmd_processor_switches:
  description: >-
    CMD.EXE command-line switches that affect language behavior (CMD /?).
  delayed_expansion: "cmd /V:ON enables delayed expansion; /V:OFF disables it"
  extensions: "cmd /E:ON enables Command Extensions; /E:OFF disables them"
  defaults: >-
    Command Extensions are enabled by default; delayed expansion is disabled
    by default (CMD /?, SET /?).
  compatibility_aliases: >-
    For compatibility, /X is the same as /E:ON, /Y is the same as /E:OFF, and
    /R is the same as /C (CMD /?). Other unrecognized switches are ignored.
  c_k_s_quoting: >-
    /C runs string then terminates; /K runs string and remains. /S modifies
    quote handling after /C or /K. When /C or /K is used, quotes are preserved
    only if there is no /S, exactly two quotes, no special &<>()@^| between
    them, whitespace between the quotes, and the interior names an executable;
    otherwise a leading quote is stripped and the last quote on the line is
    removed (CMD /?).
  echo_off_q: "/Q turns echo off for the CMD session (CMD /?)"
  disable_autorun_d: >-
    /D disables execution of AutoRun commands from the registry on startup
    (CMD /?).
  output_ansi_a: >-
    /A causes output of internal commands to a pipe or file to be ANSI
    (CMD /?).
  output_unicode_u: >-
    /U causes output of internal commands to a pipe or file to be Unicode
    (CMD /?).
  file_completion_f: >-
    /F:ON enables file and directory name completion characters; /F:OFF
    disables them. Completion is off by default (CMD /?).
  color_t: >-
    /T:fg sets the foreground/background colors for the session (see COLOR /?;
    CMD /?).
  autorun_registry: >-
    Unless /D is specified, CMD looks for AutoRun REG_SZ/REG_EXPAND_SZ values
    under HKLM and HKCU Software\Microsoft\Command Processor\AutoRun and
    executes them first when present (CMD /?). Command-line switches take
    precedence over registry EnableExtensions / DelayedExpansion /
    CompletionChar settings; SETLOCAL Enable/Disable Extensions or
    DelayedExpansion takes precedence over /E and /V for the local scope.

command_extensions_off:
  description: >-
    Behavior when Command Extensions are disabled via cmd /E:OFF, /Y, registry
    EnableExtensions=0, or SETLOCAL DisableExtensions (CMD /?, IF /?, SET /?,
    FOR /?, CALL /?, GOTO /?, SHIFT /?).
  disable_paths:
    - "cmd /E:OFF"
    - "cmd /Y"
    - "SETLOCAL DisableExtensions"
    - "registry Command Processor EnableExtensions=0"
  base_if_remains: >-
    Base IF forms remain: IF [NOT] ERRORLEVEL n, IF [NOT] string1==string2, and
    IF [NOT] EXIST filename.
  extension_if_unavailable: >-
    Extension IF forms are unavailable: compare-ops (EQU/NEQ/LSS/LEQ/GTR/GEQ),
    /I, IF DEFINED, and IF CMDEXTVERSION. Using them yields a syntax error
    (for example 'EQU was unexpected', '/I' compare forms unexpected, or
    'DEFINED' operand unexpected).
  goto_eof_not_special: >-
    GOTO :EOF is not an end-of-file target without extensions; cmd searches for
    a user label named eof and errors if none exists. A user :eof label works
    as an ordinary label target.
  call_label_and_modifiers: >-
    CALL :label internal routines and percent-tilde / %* argument expansions
    require extensions. With extensions off, %* expands to literal * and %~1
    leaves literal ~1 (leading % consumed). Base %0-%9 still expand.
  call_label_runtime: >-
    With extensions off, CALL :label does not transfer to an internal label; the
    CALL is skipped and execution continues at the next statement (no jump to
    :label). CALL without a colon still searches for an external program/script.
  set_a_and_string_ops: >-
    SET /A arithmetic and %var:~...% / %var:old=new% (and the delayed !var!
    equivalents) require extensions. With extensions off, a line such as
    set /A N=1+1 is treated as a plain assignment whose variable name includes
    the /A token (for example name "/A N" with value "1+1"), not as arithmetic.
    Quoted set /A "N=1+1" is a syntax error under OFF (quoted SET requires
    extensions).
  set_p_requires_extensions: >-
    SET /P requires extensions. With extensions off, set /P var=text is treated
    as a plain assignment whose variable name includes the /P token (for
    example name "/P var"), not as a prompt/read.
  prefix_query_requires_extensions: >-
    Prefix query (SET name with no equals) requires extensions. With extensions
    off it is a syntax error ("The syntax of the command is incorrect").
  quoted_assignment_requires_extensions: >-
    Quoted assignment SET "name=value" requires extensions. With extensions off
    it is a syntax error and the variable is not set. Unquoted set name=value
    remains available.
  for_slash_forms: >-
    FOR /D, /R, /L, and /F (and their options) require extensions; only the
    classic FOR %%i IN (set) DO form remains without them. Slash forms yield
    errors such as '/F was unexpected at this time'.
  shift_n: >-
    SHIFT /n requires extensions; bare SHIFT remains available.
  dynamic_environment: >-
    Dynamic environment names (CD, DATE, TIME, RANDOM, ERRORLEVEL,
    CMDEXTVERSION, CMDCMDLINE, HIGHESTNUMANODENUMBER) are not provided without
    extensions unless the user defines ordinary variables with those names.
  directory_and_prompt_gated: >-
    CD /D (other-drive change), PUSHD UNC temp-drive mapping / POPD unmap, and
    PROMPT $+ / $M codes require extensions. Plain CD, PUSHD/POPD for ordinary
    paths, and basic PROMPT codes remain. With extensions, CD also normalizes
    case to on-disk names and does not treat spaces as delimiters; without
    extensions, paths with spaces need quotes (see directory_commands). Nested
    MKDIR intermediate-directory creation also requires extensions (see
    mkdir_command).
  assoc_ftype_color_gated: >-
    ASSOC, FTYPE, and COLOR are unavailable when extensions are disabled
    (reported as not recognized internal/external commands).
  delayed_independent: >-
    Delayed expansion can be enabled while extensions are disabled. Plain
    !var! still expands; substring/replace bang forms and dynamic env names
    still need extensions (see delayed_expansion.orthogonal_to_extensions).

setlocal_options:
  flags:
    - ENABLEEXTENSIONS
    - DISABLEEXTENSIONS
    - ENABLEDELAYEDEXPANSION
    - DISABLEDELAYEDEXPANSION
  nesting_limit: >-
    Up to 32 active SETLOCAL instantiations are allowed per CALL level.
    Exceeding that limit prints "Maximum setlocal recursion level reached."
    Each CALL :label (or CALLed script) receives its own independent allocation
    of up to 32 levels. SETLOCAL /? documents implied ENDLOCAL at script end
    but does not state the numeric limit.
  implied_endlocal: "An unmatched SETLOCAL is ended when the batch script exits"
  argument_errorlevel: >-
    With extensions, SETLOCAL sets ERRORLEVEL to 0 when given a recognized
    Enable/Disable argument (ENABLEEXTENSIONS, DISABLEEXTENSIONS,
    ENABLEDELAYEDEXPANSION, or DISABLEDELAYEDEXPANSION) and to 1 for an
    unrecognized argument. SETLOCAL /? lists all four flags but still says
    "two valid arguments"; live cmd treats all four as valid (ERRORLEVEL 0).
    Classic probe: VERIFY OTHER 2>nul & SETLOCAL ENABLEEXTENSIONS & IF
    ERRORLEVEL 1 (SETLOCAL /?).
  help_text_two_arguments: >-
    Captured SETLOCAL /? wording about "two valid arguments" is incomplete
    relative to the four Enable/Disable flags it documents and that live cmd
    accepts; prefer the flags list and live ERRORLEVEL behavior over that count.
  survive_via_percent_on_same_line: >-
    Percent expansion happens before ENDLOCAL runs on a chained line, so
    endlocal & set "out=%in%" can export in into out after the local scope
    ends.
  precedence_over_cmd_switches: >-
    SETLOCAL Enable/Disable Extensions or DelayedExpansion takes precedence
    over CMD /E and /V for the duration of that local scope (SETLOCAL /?).
  endlocal_restores_state: >-
    ENDLOCAL restores the prior environment and the prior enabled/disabled
    state of Extensions and DelayedExpansion from the matching SETLOCAL
    (ENDLOCAL /?).

errorlevel:
  if_form: >-
    IF ERRORLEVEL n is true when the current exit code is greater than or equal
    to n (not equality). Prefer IF %ERRORLEVEL% EQU n for exact tests when the
    dynamic ERRORLEVEL name is not shadowed.
  variable_form: "%ERRORLEVEL% / !ERRORLEVEL! hold the numeric exit code as text"
  env_var_shadowing: >-
    A user-defined environment variable named ERRORLEVEL (also CMDCMDLINE,
    CMDEXTVERSION, and other dynamic names) overrides %name% expansion. Defining
    ERRORLEVEL with SET prevents later commands from updating the dynamic
    %ERRORLEVEL% value until that variable is cleared. IF ERRORLEVEL n still
    reads the internal exit code, not the shadowed environment string. Prefer
    cmd /C exit N (or EXIT /B) to set ERRORLEVEL rather than SET ERRORLEVEL=.
  choice_ordinal: >-
    CHOICE sets ERRORLEVEL to the 1-based index of the selected key in the /C
    choice list (first choice -> 1, second -> 2, ...). When /C is omitted the
    default list is YN (CHOICE /?). Both /C ABC and /C:ABC forms are accepted.
    Error conditions return 255. CTRL+C or CTRL+BREAK returns 0 (CHOICE /?).
    Optional switches include /CS (case-sensitive choices), /N (hide choice
    list), /T timeout with /D default, and /M message text.
  not_errorlevel_negative: >-
    IF ERRORLEVEL n means >= n. IF NOT ERRORLEVEL n means < n. Because of the
    >= test, IF NOT ERRORLEVEL 0 is true only when ERRORLEVEL is negative, not
    when ERRORLEVEL is any non-zero value. Prefer IF %ERRORLEVEL% NEQ 0 (with
    extensions) for a non-zero test when the dynamic name is not shadowed.

cmdextversion:
  description: >-
    IF CMDEXTVERSION n is true when the Command Extensions version is >= n.
    Never true when extensions are disabled. %CMDEXTVERSION% exposes the version.
    The first extensions version is 1 and increments when significant enhancements
    are added (IF /?).

dynamic_environment_variables:
  description: >-
    When Command Extensions are enabled, these names expand dynamically and do
    not appear in the SET listing unless the user defines a normal variable with
    the same name (which overrides the dynamic value). Source: SET /?.
  names:
    CD: current directory string
    DATE: current date (same format as DATE command)
    TIME: current time (same format as TIME command)
    RANDOM: random decimal integer from 0 to 32767
    ERRORLEVEL: current ERRORLEVEL value
    CMDEXTVERSION: Command Processor Extensions version number
    CMDCMDLINE: original command line that invoked the Command Processor
    HIGHESTNUMANODENUMBER: highest NUMA node number on this machine
  time_leading_space: >-
    %TIME% uses the same format as the TIME command. For hours 0-9 the hour
    field is commonly space-padded (a leading space before the digit), so the
    expanded string can begin with whitespace. Prefer replacing spaces or
    zero-padding before parsing time fields.
  date_locale_format: >-
    %DATE% uses the same region-specific format as the DATE command (order of
    day/month/year, separators, and optional weekday text vary by locale). Do
    not assume a fixed layout such as MM/DD/YYYY.
  time_locale_delimiters: >-
    The TIME format (and therefore %TIME%) can use locale-specific separators.
    In some locales the separator may be a comma, which is also a command
    argument delimiter -- parse %TIME% carefully in portable scripts.
  cmdcmdline_shape: >-
    %CMDCMDLINE% expands to the original command line that started this cmd.exe
    process (SET /?). When a script is launched via cmd /C "script.cmd args",
    the expanded value typically includes the /C switch and the quoted script
    invocation text rather than only the script's own arguments.
  extensions_required: true

keyword_boundaries:
  description: >-
    Builtin keywords must not be glued to %, !, or quote marks. Live cmd expands
    percent forms first, so IF%1 and SET%x% become IF1 / SET1 and are not
    recognized as IF/SET. Spaced forms (IF %1, SET %x%, FOR %%i) are required.
  reject_glue_after_keyword:
    - "%"
    - "!"
    - "\""
    - "'"
    - "`"

if_forms:
  description: "IF predicates (IF /?)"
  base_forms:
    - "IF [NOT] ERRORLEVEL number command"
    - "IF [NOT] string1==string2 command"
    - "IF [NOT] EXIST filename command"
  extension_forms:
    - "IF [/I] string1 compare-op string2 command"
    - "IF CMDEXTVERSION number command"
    - "IF DEFINED variable command"
  compare_ops:
    - EQU
    - NEQ
    - LSS
    - LEQ
    - GTR
    - GEQ
  compare_ops_notes: >-
    If both sides are all decimal digits, compare-ops perform a numeric
    comparison; otherwise a string comparison. Quoting a side (for example
    "000" EQU "0") forces string comparison even when the text looks numeric.
    String ordering is not raw ASCII byte order (for example a LSS A can be
    true). /I forces case-insensitive string compares and also applies to the
    string1==string2 form and to compare-ops.
  defined_notes: "DEFINED takes a variable name without % percent signs"
  else_same_line: >-
    ELSE must appear on the same physical line as the end of the IF command
    (after the THEN command or the closing ')' of a parenthesized block).
  exist_files_and_directories: >-
    IF EXIST tests whether a file or directory path exists (trailing backslash
    forms commonly target directories). Wildcard masks in the EXIST operand
    are accepted and succeed when at least one matching filesystem entry
    exists (for example IF EXIST *.txt).
  empty_unquoted_operands: >-
    Unquoted empty IF operands cause a syntax error (for example IF == text or
    IF %EMPTY%==x when EMPTY is undefined and expands to nothing). Prefer
    quoted compares such as IF "%var%"=="value" or IF DEFINED for presence
    tests.
  exist_spelling: >-
    The file/directory test keyword is EXIST (IF /?), not EXISTS. A misspelled
    IF EXISTS ... is not recognized as the EXIST form and typically fails as a
    syntax error at runtime (for example 'nul was unexpected at this time').
  operand_padding: >-
    Classic unquoted padding such as IF .%var%.==.value. can guard against
    empty expansion for simple values, but breaks when the expanded text
    contains spaces or IF metacharacters (the line re-tokenizes). Prefer
    quoted compares or IF DEFINED for robust empty/undefined handling.
  no_and_or_keywords: >-
    IF has no native boolean AND/OR keywords. Tokens such as and / or after a
    completed IF command are parsed as separate commands (often yielding
    "'and' is not recognized..."). Compose conditions with nested IF, chained
    && / || on ERRORLEVEL, or other documented patterns -- not IF ... and ....

if_block_parentheses:
  description: >-
    A parenthesized THEN/ELSE block requires '(' on the same logical line as
    the predicate (or ELSE); intervening spaces before '(' are allowed. An
    unclosed '(' block is a syntax error at runtime. ELSE must attach to the
    closing ')' without an intervening newline (IF /?).

command_chaining:
  description: >-
    Statement separators and conditionals compose commandLine forms in the
    grammar and in cmd.exe.
  operators:
    "&": "Unconditional command separator; run the next statement regardless of ERRORLEVEL"
    "&&": "Run the next statement only if the prior statement left ERRORLEVEL 0"
    "||": "Run the next statement only if the prior statement left a non-zero ERRORLEVEL"
    "|": "Pipe stdout of the left statement into stdin of the right (not a conditional)"
  grouping: >-
    Parentheses group a statement list so trailing && / || observe the group's
    resulting ERRORLEVEL.
  pipe_child_process: >-
    Each side of a pipe runs in a child cmd.exe context. Environment mutations
    (SET, SET /P, SETLOCAL) on a pipe side do not update the parent environment.
  pipe_delayed_expansion_default: >-
    Pipe-side child cmd.exe instances start with the processor defaults for
    delayed expansion and extensions (delayed expansion off unless registry or
    an explicit /V:ON on that child enables it; extensions on by default).
    Parent SETLOCAL Enable/Disable DelayedExpansion or Extensions does not
    automatically apply inside the pipe child, so !var! on a pipe side often
    remains literal unless the child enables delayed expansion itself, and a
    child script invoked via the pipe can still use extension IF/FOR/SET forms
    even when the parent used SETLOCAL DisableExtensions.
  pipe_extensions_default: >-
    Same isolation as pipe_delayed_expansion_default for Command Extensions:
    the pipe child does not inherit the parent's SETLOCAL DisableExtensions /
    EnableExtensions state. A separate script CALLed from the pipe right-hand
    side runs under the child's default extensions (on unless that child was
    started with /E:OFF or equivalent).
  and_or_chain_trap: >-
    In A && (B) || (C), statement C runs when A fails or when B leaves a
    non-zero ERRORLEVEL. A successful A followed by a failing B still executes
    C -- this is not a boolean if/else. Group carefully or test ERRORLEVEL
    explicitly when only one of B/C should run.
  trailing_ampersand_in_block: >-
    Inside a parenthesized block, a line that ends with a bare & (no following
    command on that physical line) is a syntax error. Terminate with & rem, or
    escape a literal ampersand as ^&, rather than leaving a dangling separator.

batch_parameters:
  description: "Batch argument references (CALL /?, SHIFT /?)"
  percent_star: >-
    With Command Extensions, %* expands to all arguments (%1 %2 ...). With
    extensions disabled, %* is not expanded (literal * after the leading % is
    consumed). Base %1-%9 and %0 still expand without extensions.
  percent_star_and_shift: >-
    SHIFT moves %1/%2/... but does not change the text expanded by %* (still
    the original full argument list).
  shift_n: >-
    With extensions, SHIFT /n starts shifting at argument n where n is 0..8
    (SHIFT /?). SHIFT /9 is invalid.
  shift_default: >-
    Bare SHIFT (no /n) shifts starting at %0: the former %1 becomes the new %0,
    former %2 becomes %1, and so on.
  shift_vacates_high_slots: >-
    After SHIFT, the highest previously occupied %n slot becomes empty when there
    is no further argument to shift into it (for example with args a b, after one
    SHIFT %1 becomes b and %2 expands empty).
  percent_zero: >-
    %0 is the script path or, inside CALL :label, the :label identity -- not a
    user-supplied argument. With extensions, path modifiers such as %~dp0
    apply; without extensions %~ forms are not expanded. The text of %0 mirrors
    the spelling/casing/quoting used to invoke the script or CALL :label (for
    example CALL :MiXeD yields %0=':MiXeD').
  multi_digit_percent: >-
    Only %0 through %9 are parameter slots. %10 is %1 followed by literal 0
    (for example with %1=one, %10 expands to one0). The same single-digit
    termination applies to percent-tilde forms (%~10 is %~1 plus literal 0;
    see percent_tilde_notes.multi_digit_parameter).
  argument_delimiters: >-
    Unquoted argument tokens are split on space, tab, comma, semicolon, and
    equals. Quotes preserve those characters inside a single argument.
  empty_quoted_argument: >-
    An explicitly empty quoted argument ("") still occupies a parameter slot.
    For example call :label "" hop leaves %1 as an empty argument and %2=hop.
  command_line_limit: >-
    The maximum length of a command line that cmd.exe accepts is 8191
    characters (Microsoft documentation for cmd.exe). Longer input is rejected
    or truncated by the console host before normal parsing completes.

call_goto:
  description: "CALL :label and GOTO :EOF (CALL /?, GOTO /?)"
  call_label: >-
    CALL :label arguments creates a new batch context at the label. Control
    returns to the statement after CALL when the called context reaches EOF
    (or GOTO :EOF). Reaching EOF a second time exits the script.
  call_requires_colon_for_label: >-
    CALL :label requires the colon for an internal label. CALL name without a
    colon searches PATH/PATHEXT for an external program or script instead of
    jumping to :name.
  call_missing_label: >-
    CALL :missinglabel sets ERRORLEVEL to 1 and continues with the next
    statement (it does not abort the script).
  call_preserves_prior_errorlevel: >-
    A successful CALL :label that returns without EXIT /B (falling through to
    EOF of the routine) does not clear ERRORLEVEL to 0; the prior exit code
    remains. EXIT /B n from the called context sets ERRORLEVEL to n on return.
    Prefer an explicit EXIT /B 0 at the end of routines when a clean success
    code is required.
  call_script_returns: >-
    CALL other.cmd (or other.bat) runs the script and returns to the caller.
    Invoking other.cmd as a bare command transfers control permanently and does
    not return to the caller when the child ends.
  goto_eof: >-
    GOTO :EOF transfers control to the end of the current batch script file
    without requiring a user-defined label. A user label named :eof does not
    replace this extension target.
  goto_eof_vs_label: >-
    With the colon (GOTO :EOF), Command Extensions treat EOF as the end-of-file
    target and ignore a user label :EOF. Without the colon (GOTO EOF), cmd
    performs an ordinary label search and jumps to :EOF if present.
  goto_label_matching: >-
    Ordinary GOTO targets are matched case-insensitively. A leading colon on
    the GOTO operand is optional for user labels (goto foo and goto :foo both
    match :Foo). A missing label aborts with an error and does not continue.
  label_line_form: >-
    A label is a line beginning with a colon (GOTO /?). Indented labels are
    accepted by cmd; prefer a colon in column 0 for portable scripts.
  label_charset: >-
    User label names may include letters, digits, dots, spaces, and many
    punctuation characters after the leading colon (for example :ok.label and
    :has space). A second colon immediately after the first (::) is the
    label-style remark form, not a normal jump target. Prefer simple
    alphanumeric labels for portable scripts; avoid ')' inside labels used
    within parenthesized blocks (see remarks.double_colon). The ANTLR LABEL
    lexer token is stricter than live cmd and stops at whitespace, so spaced
    labels are not represented as a single LABEL token in the conformance
    grammar; consumers that need spaced labels must not rely on that token alone.
  label_fallthrough: >-
    A label line is not a control-flow barrier. Execution falls through into
    following statements unless a GOTO/EXIT (or similar) jumps away. After
    CALL :label returns, a later encounter of the same :label as a line label
    runs that body again unless fenced with GOTO :EOF or EXIT /B.

exit_semantics:
  description: "EXIT [/B] [exitCode] (EXIT /?)"
  bare_exit: >-
    Bare EXIT (without /B) terminates the cmd.exe process (closes the console
    session when it is the top-level interpreter). Prefer EXIT /B inside batch
    scripts when only the script/routine should end.
  exit_b: >-
    EXIT /B exits the current batch script context (returns from a CALL :label
    routine, or ends the script) without necessarily closing the parent cmd.exe
    window. Optional exitCode sets ERRORLEVEL when using /B.
  exit_b_preserves_without_code: >-
    EXIT /B with no exitCode leaves the prior ERRORLEVEL unchanged (both when
    returning from CALL :label and when ending a CALLed script). Use EXIT /B n
    when a specific code must be returned.

remarks:
  rem: >-
    REM remarks out the remainder of the physical line when used as a command.
    Because the lexer consumes from REM through end-of-line, a trailing
    `& command` on the same REM line is not a separate statement (it does not
    run). Midline REM after other tokens is not special -- only line-start REM
    is recognized as a remark command.
  double_colon: >-
    A line starting with :: is a label whose second character is :, commonly
    used as a remark. Labels must not place : in the second character position
    for real jump targets. Inside parenthesized blocks, prefer REM: a :: line
    that contains ')' has historically been able to close the block early
    because ')' remains significant on label lines on some hosts/versions.
    Prefer REM inside ( ) blocks for portable scripts.
  rem_vs_label: >-
    Prefer REM for portable remarks. :: is a label form and can break or
    misparse inside parenthesized IF/FOR blocks.
  echo_visibility: >-
    With ECHO ON, a REM remark is echoed to stdout like other commands. A ::
    label-style remark is typically not echoed as a command line. Neither form
    prints the remark text as output by itself when ECHO is OFF.

redirection:
  description: >-
    Cmd.exe I/O redirection attaches to a statement (or parenthesized group).
    Handle numbers default to 1 (stdout) for > / >> and 0 (stdin) for <.
  operators:
    ">": "Overwrite redirect of stdout (or n>) to a file"
    ">>": "Append redirect of stdout (or n>>) to a file"
    "<": "Redirect stdin (or n<) from a file"
    ">&": "Duplicate an output handle onto another handle (e.g. 2>&1, >&2)"
    "<&": "Duplicate an input handle onto another handle"
  examples:
    - "echo ok >out.txt"
    - "echo more >>out.txt"
    - "sort <in.txt"
    - "command 2>err.txt"
    - "command >out.txt 2>&1"
    - "command 1>nul 2>&1"
    - "command >&2"
    - ">out.txt echo hi"
  nul_suppress: >-
    Redirecting to NUL discards that stream (commonly 1>nul, 2>nul, or
    >nul 2>&1).
  group_redirect: >-
    A parenthesized group may take a trailing redirect that applies to the
    whole group.
  leading_redirect: >-
    A redirect may appear before the command name (for example
    >out.txt echo hi); cmd applies it to that statement.
  handle_order: >-
    Redirects apply left to right. command >file 2>&1 sends both stdout and
    stderr to file. command 2>&1 >file first duplicates stderr to the current
    stdout (often the console), then redirects stdout alone to file, so stderr
    may remain on the console.
  special_devices: >-
    NUL and CON are reliable redirect targets/sources on modern Windows (for
    example >nul, >CON). Other reserved device names such as PRN, AUX, COM1,
    and LPT1 may fail as redirect targets with "The system cannot find the file
    specified" depending on the host; treat them as OS device names, not
    ordinary files.

paren_block_expansion:
  description: >-
    Parentheses group statements into a block. Percent (%) expansion for names
    inside the block is performed when the block is parsed, not when each line
    executes. Delayed expansion (!name!) is performed at execution time when
    enabled. Therefore SET name=value followed by echo %name% inside the same
    block typically still shows the pre-block value, while echo !name! shows
    the updated value after SETLOCAL EnableDelayedExpansion.
  percent_at_parse: >-
    %var% inside ( ) expands with the value known when the block is read.
  delayed_at_execution: >-
    !var! inside ( ) expands when that line runs, seeing SET updates from
    earlier lines in the same block.
  nested_blocks_two_values: >-
    Nested parenthesized blocks still expose only two values for a given name:
    the value captured when the outermost block was parsed (%var%), and the
    current value at execution (!var!). Inner blocks do not create an additional
    percent-expansion snapshot layer.
  dual_value_swap: >-
    Because %var% is captured when the block is parsed and !var! updates at
    execution, a naked parenthesized block can observe both the pre-block and
    in-block values (for example swapping two variables with percent expansion
    inside one block).
expansion_phases: >-
  Approximate cmd parsing phases for a statement: (1) percent (%var%, %n, %*,
  %~) expansion; (2) special-character / caret processing and tokenization
  (including line-continuation caret); (3) command recognition and execution;
  (4) when delayed expansion is enabled, !var! expansion at execution time
  (including inside already-parsed parenthesized blocks). CALL re-parses its
  argument tail (notably doubling carets and reducing %% pairs). Pipe sides
  run in child cmd.exe contexts with their own defaults. See percent_expansion,
  delayed_expansion, caret_escape, double_percent, paren_block_expansion, and
  command_chaining for details.

command_resolution:
  description: >-
    How cmd.exe finds an external command name that is not an internal command
    (PATH /?, PATHEXT, and live cmd behavior).
  search_order: >-
    For a name without a directory path, cmd searches the current directory,
    then each directory listed in %PATH%. In each directory it tries the
    extensions listed in %PATHEXT% in order (default commonly includes
    .COM;.EXE;.BAT;.CMD and may include scripting extensions). An explicit
    extension on the name restricts the search to that extension.
  not_found_errorlevel: >-
    When no matching program or script is found, cmd prints that the name is
    not recognized and sets ERRORLEVEL to 9009.
  call_missing_script: >-
    CALL of a missing label sets ERRORLEVEL to 1 and continues (see
    call_goto.call_missing_label). CALL of a missing external script/program
    follows normal command-resolution failure (typically ERRORLEVEL 9009 for a
    bare missing name).

directory_commands:
  description: >-
    CD/CHDIR and PUSHD/POPD directory language (CD /?, PUSHD /?, POPD /?).
  cd_slash_d: >-
    CD /D (or CHDIR /D) changes the current drive as well as the directory.
    Without /D, CD D:\path sets that drive's current directory but does not
    switch the process to drive D: (CD /?). /D requires Command Extensions
    (see command_extensions_off.directory_and_prompt_gated).
  cd_drive_query: >-
    CD drive: with no path displays the current directory on that drive.
    CD with no arguments displays the current drive and directory.
  cd_case_normalization: >-
    With Command Extensions enabled, CD/CHDIR converts the current-directory
    string to the same case as the on-disk names (for example CD C:\TEMP may
    become C:\Temp) (CD /?).
  cd_spaces_not_delimiters: >-
    With Command Extensions enabled, CD/CHDIR does not treat spaces as
    delimiters, so an unquoted path with spaces is accepted (for example
    cd \path\start menu). Without extensions, such paths require quotes
    (CD /?).
  pushd_popd_stack: >-
    PUSHD path stores the current directory then changes to path. POPD returns
    to the pushed directory. With extensions, PUSHD accepts UNC paths and maps
    a temporary drive letter from Z: downward for the network resource; POPD
    can unmap that temporary drive (PUSHD /?, POPD /?).

mkdir_command:
  description: >-
    MKDIR/MD directory creation (MD /?). Intermediate-directory creation is an
    extensions feature.
  intermediate_directories: >-
    With Command Extensions enabled, MKDIR/MD creates any missing intermediate
    directories in the path (for example mkdir \a\b\c\d creates a, b, c, and d
    as needed) (MD /?). Without extensions, each level must already exist or be
    created separately; a multi-level path fails if parents are missing.

del_erase_command:
  description: >-
    DEL/ERASE file deletion (DEL /?). Attribute filters and recursion switches
    are documented in DEL /?; display semantics of /S change with extensions.
  slash_s_display_with_extensions: >-
    With Command Extensions enabled, DEL/ERASE /S shows only the files that are
    deleted, not the ones it could not find (DEL /?).

assoc_ftype_command:
  description: >-
    ASSOC and FTYPE manage file-extension associations and open-command strings
    (ASSOC /?, FTYPE /?). Both require Command Extensions (see
    command_extensions_off.assoc_ftype_color_gated).
  assoc_forms: >-
    ASSOC [.ext[=[fileType]]] displays or sets the file type for an extension;
    ASSOC .ext= deletes the association (ASSOC /?).
  ftype_forms: >-
    FTYPE [fileType[=[openCommandString]]] displays or sets the open command
    for a file type; empty open-command deletes it. Open strings may use %0/%1,
    %*, and %~n parameter forms (FTYPE /?).

path_command:
  description: >-
    The PATH command displays or sets the executable search path (PATH /?).
  display_or_set: >-
    PATH with no arguments displays the current path. PATH value sets the path
    for the session. PATH ; clears the path to empty (PATH /?).
  append_via_percent: >-
    Appending commonly uses PATH %PATH%;C:\more. Clearing with PATH ; removes
    all search directories until PATH is set again.
  dircmd_env: >-
    DIRCMD is an ordinary environment variable (not a SET-list dynamic name).
    When set, its value supplies default switches for DIR (for example
    SET DIRCMD=/B). A later DIR invocation can still pass overriding switches.

start_command:
  description: >-
    START launches a separate process/window (START /?). Grammar treats START
    as a generic command; these notes capture language-relevant switches.
  quoted_title: >-
    The first quoted argument is the window title (START "title" command ...).
    Always include an explicit title when the command path is quoted so START
    does not treat the command string as the title.
  wait_and_b: >-
    /WAIT waits for the started process to terminate. /B starts without a new
    window and with default ^C handling ignored for that application.
  batch_and_internal: >-
    When command is a batch script or internal cmd command, START typically
    invokes a new cmd.exe (commonly with /K for batch) rather than replacing
    the current interpreter. Prefer CALL to run another batch and return.
  env_and_associations: >-
    /I starts with the original environment passed to cmd.exe rather than the
    current environment. With extensions, starting a non-executable file uses
    file associations (ASSOC/FTYPE).

prompt_codes:
  description: >-
    PROMPT text may include $-codes that expand when the prompt is displayed
    (PROMPT /?). Base codes include $A & $B | $C ( $D date $E ESC $F ) $G >
    $H backspace $L < $N drive $P drive+path $Q = $S space $T time $V version
    $_ CR+LF $$ literal $. With Command Extensions, $+ shows PUSHD stack depth
    and $M shows the remote name for a network drive (or empty).
  prompt_env: >-
    %PROMPT% expands to the current prompt template string. PROMPT without
    arguments resets to the default ($P$G). Scripts can read and rewrite the
    template via %PROMPT% (for example prompt %PROMPT%$S).
  source: "PROMPT /? (audit/cmd-help/prompt-help.txt)"

break_command:
  description: >-
    BREAK is a DOS-compatibility internal. Under Windows it has no effect on
    CTRL+C checking and does not terminate FOR/IF blocks (BREAK /?). With
    Command Extensions on a debugger-attached process, BREAK may enter a
    hardcoded breakpoint; otherwise treat it as a no-op for script control flow.
  source: "BREAK /?"
